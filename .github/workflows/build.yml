name: NEXUS VK LAUNCHER — Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0-milestone-1'

      - name: Ensure gradlew is executable
        run: |
          if [ ! -f gradlew ]; then
            echo "gradlew not found — generating via 'gradle wrapper'"
            gradle wrapper --gradle-distribution-url="https://services.gradle.org/distributions/gradle-9.0-milestone-1-bin.zip"
          fi
          chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign Release APK
        if: github.event.inputs.build_type == 'release' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          find . -name "*.apk" -path "*/release/*" ! -path "*/intermediates/*" | while read apk; do
            $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)/apksigner sign \
              --ks keystore.jks \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass pass:"$STORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out "${apk%.apk}-signed.apk" \
              "$apk"
          done
          rm -f keystore.jks

      - name: Collect APKs
        run: |
          mkdir -p nexus_vk_output
          find . -name "*.apk" ! -path "*/intermediates/*" -exec cp {} nexus_vk_output/ \;
          ls -lh nexus_vk_output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-VK-LAUNCHER-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: nexus_vk_output/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## NEXUS VK LAUNCHER — Build" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tipo | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -d nexus_vk_output ]; then
            echo "### APKs" >> $GITHUB_STEP_SUMMARY
            for f in nexus_vk_output/*.apk; do
              [ -f "$f" ] && echo "- \`$(basename $f)\`" >> $GITHUB_STEP_SUMMARY
            done
          fi