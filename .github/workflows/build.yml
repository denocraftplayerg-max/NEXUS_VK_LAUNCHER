name: NEXUS VK LAUNCHER — Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease --stacktrace

      - name: Collect APKs
        if: always()
        run: |
          mkdir -p nexus_vk_output
          find . -name "*.apk" ! -path "*/intermediates/*" -exec cp {} nexus_vk_output/ \;
          ls -lh nexus_vk_output/ || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-VK-LAUNCHER-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: nexus_vk_output/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          echo "## NEXUS VK LAUNCHER — Build" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tipo | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
